<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IMU Tremor Monitor (BLE)</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fefefe;
      color: #000000;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    button {
      padding: 8px 16px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: #22c55e;
      color: #022c22;
      font-weight: 600;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      font-size: 14px;
      opacity: 0.9;
    }
    .cards {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .card {
      flex: 1 1 160px;
      background: #b4b8cd;
      border-radius: 12px;
      padding: 10px 12px;
      box-shadow: 0 10px 25px rgba(15,23,42,0.75);
      border: 1px solid #000000;
    }
    .card-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #000000;
      margin-bottom: 4px;
    }
    .card-value {
      font-size: 20px;
      font-weight: 600;
    }
    .card-unit {
      font-size: 12px;
      color: #6b7280;
      margin-left: 4px;
    }
    .state-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      margin-left: 6px;
    }
    .state-0 { background: #f086b8; color: #000000; }
    .state-1 { background: #f97316; color: #111827; }
    .state-2 { background: #facc15; color: #111827; }
    .state-3 { background: #38bdf8; color: #0f172a; }

    .charts {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    @media (min-width: 900px) {
      .charts {
        grid-template-columns: 1fr 1fr;
      }
      .charts > .full-width {
        grid-column: 1 / -1;
      }
    }

    canvas {
      background: #ffffff;
      border-radius: 12px;
      padding: 8px;
      box-shadow: 0 10px 25px rgba(15,23,42,0.75);
      border: 1px solid #1f2937;
    }

    .warning {
      font-size: 14px;
      color: #f97316;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Parkinson&#39;s Tremor Monitor (Web Bluetooth)</h1>

    <div class="toolbar">
      <button id="connectBtn">Connect Bluetooth</button>
      <button id="startSegBtn">Start Segment</button>
      <button id="endSegBtn" disabled>End Segment</button>
      <div class="status">
        Status: <span id="statusText">Not connected</span>
      </div>
    </div>

    <div id="warning" class="warning" style="display:none;">
      Your browser does not support Web Bluetooth API. Please use Chrome / Edge (Desktop),
      and make sure Bluetooth is enabled.
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-title">Frequency</div>
        <div class="card-value">
          <span id="freqVal">0.00</span>
          <span class="card-unit">Hz</span>
        </div>
      </div>
      <div class="card">
        <div class="card-title">RMS Acc</div>
        <div class="card-value">
          <span id="rmsVal">0.0000</span>
          <span class="card-unit">g</span>
        </div>
      </div>
      <div class="card">
        <div class="card-title">State</div>
        <div class="card-value">
          <span id="stateVal">0</span>
          <span id="stateBadge" class="state-badge state-0">Normal / Other</span>
        </div>
      </div>
    </div>

    <!-- AI 诊断结果卡片 -->
    <div class="card" style="margin-bottom:16px;">
      <div class="card-title">AI Diagnosis</div>
      <div class="card-value" style="font-size:14px; line-height:1.4; white-space:pre-wrap;" id="aiOutput">
        (no analysis yet)
      </div>
    </div>

    <div class="charts">
      <div class="full-width">
        <canvas id="freqChart"></canvas>
      </div>
      <div>
        <canvas id="rmsChart"></canvas>
      </div>
      <div>
        <canvas id="stateChart"></canvas>
      </div>
    </div>
  </div>

  <script>
    // === DOM 元素 ===
    const connectBtn = document.getElementById("connectBtn");
    const startSegBtn = document.getElementById("startSegBtn");
    const endSegBtn = document.getElementById("endSegBtn");
    const statusText = document.getElementById("statusText");
    const warningEl = document.getElementById("warning");

    const freqValEl = document.getElementById("freqVal");
    const rmsValEl = document.getElementById("rmsVal");
    const stateValEl = document.getElementById("stateVal");
    const stateBadgeEl = document.getElementById("stateBadge");
    const aiOutputEl = document.getElementById("aiOutput");

    // === Web Bluetooth 支持检测 ===
    if (!navigator.bluetooth) {
      warningEl.style.display = "block";
      connectBtn.disabled = true;
      startSegBtn.disabled = true;
      endSegBtn.disabled = true;
    }

    // UART UUID（与你板子上的 UUID 对应）
    const UART_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const UART_TX_CHAR_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

    let bleDevice = null;
    let txCharacteristic = null;

    // === 数据缓存 ===
    const timeData = [];
    const freqData = [];
    const rmsData = [];
    const stateData = [];

    let sampleIndex = 0;
    let lastRms = 0.0;
    let lastState = 0;

    const MAX_POINTS = 200;

    // 片段相关
    let isRecordingSegment = false;
    let currentSegment = [];

    // === Chart.js ===
    const freqCtx = document.getElementById("freqChart").getContext("2d");
    const rmsCtx = document.getElementById("rmsChart").getContext("2d");
    const stateCtx = document.getElementById("stateChart").getContext("2d");

    const freqChart = new Chart(freqCtx, {
      type: "line",
      data: {
        labels: timeData,
        datasets: [{
          label: "Frequency (Hz)",
          data: freqData,
          borderWidth: 2,
          tension: 0.1,
          fill: false
        }]
      },
      options: {
        responsive: true,
        animation: false,
        scales: {
          x: {
            title: { display: true, text: "Time (s)" }
          },
          y: {
            title: { display: true, text: "Hz" },
            suggestedMin: 0,
            suggestedMax: 10
          }
        }
      }
    });

    const rmsChart = new Chart(rmsCtx, {
      type: "line",
      data: {
        labels: timeData,
        datasets: [{
          label: "RMS (g)",
          data: rmsData,
          borderWidth: 2,
          tension: 0.1,
          fill: false
        }]
      },
      options: {
        responsive: true,
        animation: false,
        scales: {
          x: {
            title: { display: true, text: "Time (s)" }
          },
          y: {
            title: { display: true, text: "g" }
          }
        }
      }
    });

    const stateChart = new Chart(stateCtx, {
      type: "line",
      data: {
        labels: timeData,
        datasets: [{
          label: "State (0=Normal,1=Tremor,2=Dyskinesia,3=FOG)",
          data: stateData,
          borderWidth: 2,
          stepped: true,
          fill: false
        }]
      },
      options: {
        responsive: true,
        animation: false,
        scales: {
          x: {
            title: { display: true, text: "Time (s)" }
          },
          y: {
            title: { display: true, text: "State" },
            ticks: {
              stepSize: 1,
              callback: (v) => v
            },
            suggestedMin: -0.5,
            suggestedMax: 3.5
          }
        }
      }
    });

    function updateCharts() {
      freqChart.update("none");
      rmsChart.update("none");
      stateChart.update("none");
    }

    function pushSample(time, freq, rms, state) {
      timeData.push(time);
      freqData.push(freq);
      rmsData.push(rms);
      stateData.push(state);

      if (timeData.length > MAX_POINTS) {
        timeData.shift();
        freqData.shift();
        rmsData.shift();
        stateData.shift();
      }

      updateCharts();
    }

    function updateStateBadge(state) {
      stateBadgeEl.className = "state-badge";
      if (state === 1) {
        stateBadgeEl.classList.add("state-1");
        stateBadgeEl.textContent = "Tremor";
      } else if (state === 2) {
        stateBadgeEl.classList.add("state-2");
        stateBadgeEl.textContent = "Dyskinesia";
      } else if (state === 3) {
        stateBadgeEl.classList.add("state-3");
        stateBadgeEl.textContent = "FOG (Freezing of Gait)";
      } else {
        stateBadgeEl.classList.add("state-0");
        stateBadgeEl.textContent = "Normal / Other";
      }
    }

    // === 解析 MCU 发来的每一行 ">name:value" ===
    function handleLine(rawLine) {
      const line = rawLine.trim();
      if (!line.startsWith(">")) return;

      const body = line.slice(1);
      const parts = body.split(":");
      if (parts.length !== 2) return;

      const name = parts[0].trim();
      const value = parseFloat(parts[1]);

      if (Number.isNaN(value)) return;

      if (name === "rms") {
        lastRms = value;
        rmsValEl.textContent = value.toFixed(4);
      } else if (name === "state") {
        lastState = value;
        stateValEl.textContent = value.toFixed(0);
        updateStateBadge(lastState);
      } else if (name === "freq") {
        const timeSec = sampleIndex * 3.0; // 每个窗口 3 秒
        sampleIndex += 1;

        freqValEl.textContent = value.toFixed(2);

        pushSample(timeSec, value, lastRms, lastState);

        if (isRecordingSegment) {
          currentSegment.push({
            time_sec: timeSec,
            freq_hz: value,
            rms_g: lastRms,
            state_code: lastState
          });
        }
      }
    }

    // BLE 通知数据缓冲
    let bleTextBuffer = "";

    function onTxNotification(event) {
      const value = event.target.value;
      const text = new TextDecoder().decode(value);

      bleTextBuffer += text;
      const lines = bleTextBuffer.split(/\r?\n/);
      bleTextBuffer = lines.pop();   // 最后一行可能是未完整的一行

      for (const line of lines) {
        handleLine(line);
      }
    }

    // === 调用本地 LLM（走你的 /api/diagnose）===
    async function analyzeSegmentWithLLM(segment) {
      const n = segment.length;
      let sumFreq = 0, sumRms = 0;
      let cntState = {0: 0, 1: 0, 2: 0, 3: 0};

      for (const s of segment) {
        sumFreq += s.freq_hz;
        sumRms += s.rms_g;
        if (s.state_code in cntState) {
          cntState[s.state_code]++;
        }
      }

      const avgFreq = sumFreq / n;
      const avgRms = sumRms / n;
      const dominantState = Number(
        Object.entries(cntState).sort((a, b) => b[1] - a[1])[0][0]
      );

      const summary = {
        num_windows: n,
        avg_freq_hz: avgFreq,
        avg_rms_g: avgRms,
        state_counts: cntState,
        dominant_state: dominantState,
        windows: segment
      };

      const payload = {
        model: "llama-3.2-3b-instruct",
        messages: [
          {
            role: "system",
            content: `
You are a clinically-oriented assistant helping to describe patterns in movement data for Parkinson's disease monitoring.

Your tasks:
- Use a professional but understandable tone, as if writing a short clinical note for a neurologist and an informed patient.
- Focus on *data description* and *pattern interpretation*, not diagnosis or treatment.
- Always include a clear disclaimer that this is NOT a medical diagnosis and must be interpreted by a clinician.
- Structure your answer in numbered sections.
`
          },
          {
            role: "user",
            content: `
You are given a recording segment from a wearable IMU device used for Parkinson's disease monitoring.

The device collects 3-second windows of IMU data and, for each window, computes:
- freq_hz: dominant tremor frequency in that window (in Hz)
- rms_g: RMS acceleration amplitude (in g)
- state_code:
    0 = normal / other
    1 = tremor-like pattern (approximately 3–5 Hz)
    2 = dyskinesia-like pattern (approximately 5–7 Hz)
    3 = freezing-of-gait-like pattern (FOG; low-frequency, irregular or intermittent movement signal)

Here is a JSON summary of one continuous segment:
${JSON.stringify(summary, null, 2)}

Please analyze this segment and respond in **English** with the following structured format:

1. **Overview (2–4 sentences)**
   - Summarize the overall movement pattern (e.g., mostly stable, clear tremor band, fluctuating, noisy, etc.).
   - Mention approximately how long the segment appears to cover (based on number of windows × 3 seconds).

2. **Quantitative Features**
   - Report the average frequency (freq_hz) and its approximate range over the segment.
   - Report the average RMS amplitude (rms_g) and whether it is low, moderate, or high.
   - Describe the proportion of windows in each state_code (0, 1, 2, 3) and which state is dominant.

3. **Pattern Interpretation**
   - Based on the frequency band and state distribution, comment whether the data is *more consistent with*:
       - a tremor-like pattern (3–5 Hz),
       - a dyskinesia-like pattern (5–7 Hz),
       - a freezing-of-gait-like pattern (FOG, low or irregular movement),
       - or mostly normal / non-specific movement.
   - If relevant, describe whether the pattern is relatively constant or changes over time (for example: periods of normal movement interspersed with more tremor-like or FOG-like windows).

4. **Suggestions for Clinical Discussion**
   - 假设你是一个专业的医生，针对目前的分析结果，给出一些详细建议，帮助患者更好地管理自己的症状（例如：调整哪些药物时间、增加或减少运动量、注意休息，多做哪些运动等）。

5. **Important Disclaimer**
   - Explicitly state that this analysis is based only on the IMU-derived features,
     does *not* represent a medical diagnosis,
     and must be interpreted and validated by a qualified healthcare professional.

Do NOT recommend any medication or treatment changes.
`
          }
        ],
        temperature: 0.2,
        max_tokens: 800
      };

      console.log("LLM payload:", payload);

      const response = await fetch("/api/diagnose", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        const text = await response.text();
        throw new Error("HTTP " + response.status + ": " + text);
      }

      const data = await response.json();
      console.log("LLM raw response:", data);

      const content = data.choices?.[0]?.message?.content ?? "(no content)";
      return content.trim();
    }

    // === 连接 BLE ===
// 注意：把这里的名字改成你板子的广播名，比如 "PD_Tremor"
// ========= 在前面定义一个常量：目标设备名前缀 =========
const TARGET_NAME_PREFIX = "Tremor-STM32";

// === 连接 BLE（按名字过滤）===
async function connectBLE() {
  try {
    statusText.textContent = "Requesting BLE device...";

    const device = await navigator.bluetooth.requestDevice({
      // 按名字前缀过滤，只弹出名字以 Tremor-STM32 开头的设备
      filters: [
        { namePrefix: TARGET_NAME_PREFIX }
      ],
      // 再声明一下我们后面要访问的自定义 service
      optionalServices: [UART_SERVICE_UUID]
    });

    console.log("Selected device:", device.name || "(no name)", device);

    bleDevice = device;

    statusText.textContent = "Connecting GATT...";
    const server = await device.gatt.connect();

    const service = await server.getPrimaryService(UART_SERVICE_UUID);
    txCharacteristic = await service.getCharacteristic(UART_TX_CHAR_UUID);

    await txCharacteristic.startNotifications();
    txCharacteristic.addEventListener(
      "characteristicvaluechanged",
      onTxNotification   // 注意这里要用你上面定义的 onTxNotification
    );

    statusText.textContent = `BLE Connected: ${device.name || "unnamed device"}`;
    connectBtn.disabled = true;

    device.addEventListener("gattserverdisconnected", () => {
      statusText.textContent = "BLE Disconnected";
      connectBtn.disabled = false;
    });
  } catch (err) {
    console.error(err);
    statusText.textContent = "BLE Error: " + err;
  }
}




    connectBtn.addEventListener("click", () => {
      if (!navigator.bluetooth) {
        alert("Web Bluetooth API not supported in this browser.");
        return;
      }
      connectBLE();
    });

    // 片段开始 / 结束按钮
    startSegBtn.addEventListener("click", () => {
      if (!isRecordingSegment) {
        isRecordingSegment = true;
        currentSegment = [];
        aiOutputEl.textContent = "(recording segment...)";
        startSegBtn.disabled = true;
        endSegBtn.disabled = false;
      }
    });

    endSegBtn.addEventListener("click", () => {
      if (isRecordingSegment) {
        isRecordingSegment = false;
        startSegBtn.disabled = false;
        endSegBtn.disabled = true;

        if (currentSegment.length === 0) {
          aiOutputEl.textContent = "No data recorded in this segment.";
          return;
        }

        aiOutputEl.textContent = "Analyzing segment with local LLM...";
        analyzeSegmentWithLLM(currentSegment)
          .then(text => {
            aiOutputEl.textContent = text;
          })
          .catch(err => {
            console.error(err);
            aiOutputEl.textContent = "Error calling local LLM: " + err.message;
          });
      }
    });
  </script>
</body>
</html>
